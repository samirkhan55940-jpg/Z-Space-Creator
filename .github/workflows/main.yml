name: Z-System Final APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      # Asli APK folder structure banana
      - name: Create Structure
        run: |
          mkdir -p output
          # Sabhi scripts aur dashboard ko ek file mein "Pack" karna
          zip -r output/Z-System-v2.apk Dashboard.html Z-Ait-Engine.sh Z-Injector.sh Z-Test.sh
          echo "Z-App Ready at output folder"

      # Exact path specify karna taaki "No files found" na aaye
      - name: Upload Z-App
        uses: actions/upload-artifact@v4
        with:
          name: Z-System-Final-APK
          path: output/Z-System-v2.apk
