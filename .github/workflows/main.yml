name: Build Z-Asli-App
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      # Z-Hack: Agar gradlew nahi hai, toh engine khud banao
      - name: Auto-Generate Gradle Wrapper
        run: |
          if [ ! -f gradlew ]; then
            gradle wrapper
          fi
          chmod +x gradlew

      - name: Build APK with App Folder
        run: ./gradlew :app:assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Z-System-Final-APK
          path: app/build/outputs/apk/debug/app-debug.apk
