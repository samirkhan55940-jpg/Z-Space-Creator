name: Build Z-App APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
      
      - name: Create Z-App APK
        run: |
          # Ye command saari scripts ko APK mein pack kar degi
          ./gradlew assembleDebug

      - name: Upload Z-App
        uses: actions/upload-artifact@v4
        with:
          name: Z-System-App
          path: app/build/outputs/apk/debug/app-debug.apk
