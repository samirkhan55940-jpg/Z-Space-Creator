name: Z-Quick APK Build
on: [push]

jobs:
  build_apk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Z-Launcher
        run: |
          mkdir -p output
          echo "Wrapping Dashboard.html into Z-System Launcher..."
          # Ye command aapke HTML ko ek Mobile App format mein pack karegi
          zip -r output/Z-System-App.apk Dashboard.html Z-Ait-Engine.sh Z-Injector.sh
          echo "Z-App Ready for A12!"

      - name: Upload Z-App
        uses: actions/upload-artifact@v4
        with:
          name: Z-Quick-Launcher
          path: output/Z-System-App.apk
