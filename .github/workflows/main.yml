name: Build Z-Asli-App
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        run: chmod +x gradlew || echo "Creating Wrapper" && gradle wrapper

      - name: Build Asli APK
        run: ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Z-System-Asli-APK
          path: app/build/outputs/apk/debug/app-debug.apk
