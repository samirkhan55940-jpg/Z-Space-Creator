plugins {
    id 'com.android.application'
}

android {
    namespace 'com.zsystem.ai'
    compileSdk 33

    defaultConfig {
        applicationId "com.zsystem.ai"
        minSdk 24
        targetSdk 33
        versionCode 1
        versionName "1.0"
    }

    buildTypes {
        release {
            minifyEnabled false
        }
    }
}

dependencies {
    // Sirf zaroori files
    implementation 'androidx.appcompat:appcompat:1.6.1'
    implementation 'com.google.android.material:material:1.9.0'
}
